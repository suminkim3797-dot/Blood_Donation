<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>One Drop Saves Lives</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; font-family: 'Segoe UI', Arial, sans-serif;
    background: #0F0303;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 24px;
    color: white; text-align: center; padding: 32px;
  }
  .drop {
    width: 80px; height: 100px;
    animation: drip 1s ease-in-out infinite alternate;
  }
  @keyframes drip {
    from { transform: scale(1); }
    to   { transform: scale(1.08); }
  }
  .title { font-size: 28px; font-weight: 800; color: #C8102E; }
  .sub   { font-size: 15px; color: rgba(255,255,255,0.55); max-width: 280px; line-height: 1.6; }
  .counter {
    font-size: 52px; font-weight: 800; color: white;
    animation: pop 0.5s cubic-bezier(0.4,0,0.2,1);
  }
  @keyframes pop { 0%{transform:scale(0.7);opacity:0} 60%{transform:scale(1.15)} 100%{transform:scale(1);opacity:1} }
  .counter-label { font-size: 13px; color: rgba(255,255,255,0.4); margin-top: -12px; }
  .redirect-msg  { font-size: 13px; color: rgba(255,255,255,0.35); }
  .progress-bar-wrap {
    width: 200px; height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 99px; overflow: hidden;
  }
  .progress-bar {
    height: 100%; background: #C8102E; border-radius: 99px;
    animation: load 3s linear forwards;
  }
  @keyframes load { from{width:0%} to{width:100%} }
</style>
</head>
<body>

<svg class="drop" viewBox="0 0 80 100" xmlns="http://www.w3.org/2000/svg">
  <path d="M40 8 Q10 42 10 62 Q10 88 40 92 Q70 88 70 62 Q70 42 40 8Z" fill="#C8102E"/>
  <path d="M40 30 Q22 52 22 64 Q22 78 34 83" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="4" stroke-linecap="round"/>
</svg>

<div class="title">One Drop Saves Lives</div>
<div class="sub">You just helped fill the blood pack at QEOP. Thank you.</div>

<div class="counter" id="counter">—</div>
<div class="counter-label">scans today</div>

<div class="progress-bar-wrap"><div class="progress-bar"></div></div>
<div class="redirect-msg">Loading your AR experience...</div>

<script>
// ══════════════════════════════════════════
// REPLACE with YOUR Firebase URL
// ══════════════════════════════════════════
const FIREBASE_CONFIG = {
  databaseURL: "https://bloodpanel-dd4ae-default-rtdb.firebaseio.com/"
};

// ══════════════════════════════════════════
// REPLACE with your AR experience URL
// e.g. TGA Ci platform link, or any web URL
// ══════════════════════════════════════════
const AR_URL = "https://YOUR-AR-EXPERIENCE-URL-HERE.com";

firebase.initializeApp(FIREBASE_CONFIG);
const db  = firebase.database();
const ref = db.ref("bloodpack/scans");

// Atomically increment by 1
ref.transaction(current => (current || 0) + 1, (err, committed, snap) => {
  if (!err && committed) {
    document.getElementById('counter').textContent = snap.val().toLocaleString();
  }
});

// Redirect to AR experience after 3 seconds
setTimeout(() => { window.location.href = AR_URL; }, 3000);
</script>
</body>
</html>
