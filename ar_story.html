<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>One Drop Saves Lives</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:#000;
  font-family:'Segoe UI',Arial,sans-serif;
}

/* ── VIDEO (fullscreen) ── */
#bgVideo{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  min-width:100%;min-height:100%;
  width:auto;height:auto;
  object-fit:cover;
  z-index:0;
}

/* dark overlay so subtitles readable */
.overlay{
  position:fixed;inset:0;z-index:1;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,0.25) 0%,
    rgba(0,0,0,0.05) 40%,
    rgba(0,0,0,0.55) 75%,
    rgba(0,0,0,0.88) 100%
  );
}

/* ── TOP HUD ── */
.hud{
  position:fixed;top:0;left:0;right:0;z-index:10;
  padding:18px 20px 10px;
  display:flex;justify-content:space-between;align-items:center;
  background:linear-gradient(180deg,rgba(0,0,0,0.55) 0%,transparent 100%);
}
.hud-label{
  font-size:11px;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;
  color:rgba(255,255,255,0.65);
}
.live-badge{
  display:flex;align-items:center;gap:6px;
  font-size:11px;font-weight:700;
  color:#C8102E;letter-spacing:.08em;text-transform:uppercase;
}
.live-dot{
  width:7px;height:7px;border-radius:50%;background:#C8102E;
  animation:blink 1.3s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.1}}

/* ── SUBTITLE ── */
.subtitle-wrap{
  position:fixed;
  bottom:110px;left:0;right:0;
  z-index:10;
  padding:0 20px;
  display:flex;justify-content:center;
}
.subtitle-box{
  background:rgba(0,0,0,0.72);
  border:1px solid rgba(200,16,46,0.35);
  border-radius:14px;
  padding:14px 20px;
  max-width:360px;
  width:100%;
  backdrop-filter:blur(6px);
  opacity:0;
  transform:translateY(8px);
  transition:opacity 0.4s ease, transform 0.4s ease;
  min-height:60px;
  display:flex;align-items:center;justify-content:center;
}
.subtitle-box.visible{
  opacity:1;transform:translateY(0);
}
.subtitle-text{
  font-size:16px;line-height:1.55;
  text-align:center;color:white;font-weight:400;
}
.subtitle-text em{
  font-style:normal;color:#F5D97A;font-weight:600;
}

/* ── NHS BUTTON (always visible at bottom) ── */
.bottom-bar{
  position:fixed;
  bottom:0;left:0;right:0;
  z-index:10;
  padding:12px 20px 28px;
  background:linear-gradient(0deg,rgba(0,0,0,0.75) 0%,transparent 100%);
  display:flex;flex-direction:column;align-items:center;gap:8px;
}
.nhs-btn{
  width:100%;max-width:320px;
  padding:15px 24px;
  background:#C8102E;color:white;
  font-size:15px;font-weight:700;
  border:none;border-radius:99px;
  cursor:pointer;
  letter-spacing:.03em;
  display:flex;align-items:center;justify-content:center;gap:10px;
  text-decoration:none;
  animation:btnGlow 2.5s ease-in-out infinite;
  opacity:0;
  transform:translateY(10px);
  transition:opacity 0.6s ease, transform 0.6s ease;
}
.nhs-btn.visible{opacity:1;transform:translateY(0);}
.nhs-btn:hover{opacity:.88;}
@keyframes btnGlow{
  0%,100%{box-shadow:0 0 0 0 rgba(200,16,46,0.45)}
  50%{box-shadow:0 0 0 10px rgba(200,16,46,0)}
}
.nhs-icon{
  width:22px;height:22px;background:white;border-radius:4px;
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.nhs-icon span{font-size:9px;font-weight:900;color:#003087;letter-spacing:-.5px;}

.replay-btn{
  font-size:12px;color:rgba(255,255,255,0.4);
  background:transparent;border:none;cursor:pointer;
  text-decoration:underline;
  opacity:0;transition:opacity 0.6s ease;
}
.replay-btn.visible{opacity:1;}

/* ── FINAL OVERLAY ── */
.final-overlay{
  position:fixed;inset:0;z-index:20;
  background:rgba(0,0,0,0.92);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:18px;padding:36px 28px;
  text-align:center;
  opacity:0;pointer-events:none;
  transition:opacity 0.9s ease;
}
.final-overlay.visible{opacity:1;pointer-events:all;}

.final-drop{
  width:56px;height:70px;
  animation:dropPulse 1.8s ease-in-out infinite alternate;
}
@keyframes dropPulse{from{transform:scale(1)}to{transform:scale(1.08)}}

.final-title{
  font-size:34px;font-weight:900;color:white;line-height:1.1;
}
.final-title em{font-style:normal;color:#C8102E;}

.final-stat{
  font-size:58px;font-weight:900;color:#C8102E;line-height:1;
}
.final-stat-label{font-size:14px;color:rgba(255,255,255,0.5);margin-top:-4px;}

.final-sub{
  font-size:15px;color:rgba(255,255,255,0.65);
  line-height:1.6;max-width:280px;
}

.final-nhs-btn{
  width:100%;max-width:300px;
  padding:16px 24px;
  background:#C8102E;color:white;
  font-size:16px;font-weight:700;
  border:none;border-radius:99px;
  cursor:pointer;
  text-decoration:none;
  display:flex;align-items:center;justify-content:center;gap:10px;
  animation:btnGlow 2.5s ease-in-out infinite;
}
.final-replay{
  font-size:13px;color:rgba(255,255,255,0.35);
  background:transparent;border:none;cursor:pointer;
  text-decoration:underline;
}
</style>
</head>
<body>

<!-- BACKGROUND VIDEO -->
<video id="bgVideo" playsinline autoplay muted>
  <source src="story_video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- HUD -->
<div class="hud">
  <div class="hud-label">One Drop Saves Lives</div>
  <div class="live-badge"><div class="live-dot"></div> AR Story</div>
</div>

<!-- SUBTITLES -->
<div class="subtitle-wrap">
  <div class="subtitle-box" id="subBox">
    <div class="subtitle-text" id="subText"></div>
  </div>
</div>

<!-- BOTTOM NHS BUTTON -->
<div class="bottom-bar">
  <a class="nhs-btn" id="nhsBtn"
     href="https://www.blood.co.uk/the-donation-process/simple-steps-to-giving-blood/"
     target="_blank">
    <div class="nhs-icon"><span>NHS</span></div>
    Register to donate blood →
  </a>
  <button class="replay-btn" id="replayBtn" onclick="replay()">Watch again</button>
</div>

<!-- FINAL CARD -->
<div class="final-overlay" id="finalCard">
  <svg class="final-drop" viewBox="0 0 56 70" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M28 4 Q6 30 6 46 Q6 62 28 66 Q50 62 50 46 Q50 30 28 4Z" fill="#C8102E"/>
    <path d="M28 18 Q14 36 14 48 Q14 56 22 61" stroke="rgba(255,255,255,0.22)" stroke-width="3" stroke-linecap="round" fill="none"/>
  </svg>

  <div class="final-title">One Donor.<br><em>Saves Three Lives.</em></div>
  <div class="final-stat">3</div>
  <div class="final-stat-label">lives saved per donation</div>
  <div class="final-sub">You could be the reason someone gets their life back. Register today — it takes 5 minutes.</div>

  <a class="final-nhs-btn"
     href="https://www.blood.co.uk/the-donation-process/simple-steps-to-giving-blood/"
     target="_blank">
    <div class="nhs-icon"><span>NHS</span></div>
    Register to donate blood →
  </a>
  <button class="final-replay" onclick="replay()">Watch again</button>
</div>

<script>
// ── SUBTITLES — timed to 25 seconds ──────────────────────────
const lines = [
  { t: 0,    text: "I always know the exact moment the <em>relief starts kicking in.</em>" },
  { t: 3.5,  text: "My body feels lighter… and the pain <em>slowly fades away.</em>" },
  { t: 7,    text: "Suddenly, I'm not thinking about hospitals anymore." },
  { t: 10,   text: "I'm thinking about school, friends… <em>just living.</em>" },
  { t: 13.5, text: "When you have sickle cell, donors don't just give you blood —" },
  { t: 17,   text: "<em>you give us our lives back.</em>" },
  { t: 20,   text: "Your one donation can change my week, my month… <em>my lifetime.</em>" },
];

const video    = document.getElementById('bgVideo');
const subBox   = document.getElementById('subBox');
const subText  = document.getElementById('subText');
const nhsBtn   = document.getElementById('nhsBtn');
const replayBtn= document.getElementById('replayBtn');
const finalCard= document.getElementById('finalCard');

let subTimer = null;
let lineIdx  = 0;

// Show NHS button immediately
nhsBtn.classList.add('visible');
replayBtn.classList.add('visible');

// Start subtitles when video plays
video.addEventListener('play', startSubs);

// If video can't load (no file yet), start subs after 1s anyway
video.addEventListener('error', () => setTimeout(startSubs, 1000));
setTimeout(() => {
  if(video.paused) startSubs();
}, 1500);

function startSubs(){
  lineIdx = 0;
  clearTimeout(subTimer);
  subBox.classList.add('visible');
  scheduleNext();
}

function scheduleNext(){
  if(lineIdx >= lines.length) return;
  const line  = lines[lineIdx];
  const delay = Math.max((line.t * 1000) - (video.currentTime * 1000 || 0), 0);
  subTimer = setTimeout(() => {
    subText.innerHTML = line.text;
    lineIdx++;
    scheduleNext();
  }, delay);
}

// Show final card when video ends (or after 26s)
video.addEventListener('ended', showFinal);
setTimeout(showFinal, 26000);

function showFinal(){
  clearTimeout(subTimer);
  subBox.classList.remove('visible');
  setTimeout(() => { finalCard.classList.add('visible'); }, 500);
}

function replay(){
  finalCard.classList.remove('visible');
  subText.innerHTML = '';
  lineIdx = 0;
  clearTimeout(subTimer);
  video.currentTime = 0;
  video.play().catch(()=>{});
  setTimeout(() => {
    subBox.classList.add('visible');
    startSubs();
  }, 400);
}
</script>
</body>
</html>
