<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>One Drop Saves Lives — AR Story</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:#0A0000;
  font-family:'Segoe UI',Arial,sans-serif;
  color:white;
}

/* ── CAMERA BG SIMULATION ── */
.camera-bg{
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 120% 80% at 50% 60%, #1A0505 0%, #050000 100%);
  z-index:0;
}

/* scan line animation */
.scan-line{
  position:fixed;
  left:0;right:0;height:2px;
  background:linear-gradient(90deg, transparent, rgba(200,16,46,0.6), transparent);
  z-index:1;
  animation:scanMove 3s ease-in-out infinite;
  opacity:0;
}
@keyframes scanMove{
  0%{top:-2px;opacity:0}
  10%{opacity:1}
  90%{opacity:1}
  100%{top:100%;opacity:0}
}

/* AR corner brackets */
.brackets{
  position:fixed;inset:0;z-index:2;pointer-events:none;
}
.bracket{
  position:absolute;width:40px;height:40px;
  border-color:#C8102E;border-style:solid;opacity:0.7;
}
.bracket.tl{top:20px;left:20px;border-width:3px 0 0 3px}
.bracket.tr{top:20px;right:20px;border-width:3px 3px 0 0}
.bracket.bl{bottom:20px;left:20px;border-width:0 0 3px 3px}
.bracket.br{bottom:20px;right:20px;border-width:0 3px 3px 0}

/* ── LOADING SCREEN ── */
.screen{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:20px;
  transition:opacity 0.8s ease;
}
.screen.hidden{opacity:0;pointer-events:none;}

.loading-drop{
  width:60px;height:75px;animation:dropPulse 1s ease-in-out infinite alternate;
}
@keyframes dropPulse{from{transform:scale(1)}to{transform:scale(1.1)}}

.loading-title{font-size:22px;font-weight:700;color:#C8102E;letter-spacing:.05em;}
.loading-sub{font-size:13px;color:rgba(255,255,255,0.5);text-align:center;max-width:240px;line-height:1.6;}

.loading-bar-wrap{width:180px;height:3px;background:rgba(255,255,255,0.1);border-radius:99px;overflow:hidden;}
.loading-bar{height:100%;background:#C8102E;border-radius:99px;animation:loadBar 2.5s ease forwards;}
@keyframes loadBar{from{width:0%}to{width:100%}}

/* ── AR PERSON CONTAINER ── */
.ar-person{
  position:fixed;
  bottom:0;left:50%;transform:translateX(-50%);
  z-index:5;
  width:280px;
  display:flex;flex-direction:column;align-items:center;
  opacity:0;
  transition:opacity 1s ease, transform 1s ease;
  transform:translateX(-50%) translateY(30px);
}
.ar-person.visible{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

/* Person silhouette / avatar */
.person-figure{
  position:relative;
  width:200px;height:320px;
  display:flex;align-items:flex-end;justify-content:center;
}

/* Head */
.p-head{
  position:absolute;
  top:0;left:50%;transform:translateX(-50%);
  width:72px;height:72px;border-radius:50%;
  background:linear-gradient(145deg, #8B6348, #6B4530);
  border:2px solid rgba(200,16,46,0.4);
}
/* hair */
.p-head::before{
  content:'';position:absolute;
  top:-8px;left:-4px;right:-4px;height:30px;
  background:#1A0A00;border-radius:50% 50% 0 0 / 60% 60% 0 0;
}
/* face highlight */
.p-head::after{
  content:'';position:absolute;
  top:18px;left:14px;width:12px;height:8px;
  background:rgba(255,255,255,0.12);border-radius:50%;
}

/* Neck -->
.p-neck{
  position:absolute;
  top:68px;left:50%;transform:translateX(-50%);
  width:22px;height:20px;
  background:#7A5438;
}

/* Body -->
.p-body{
  position:absolute;
  top:84px;left:50%;transform:translateX(-50%);
  width:90px;height:150px;border-radius:12px 12px 8px 8px;
  background:linear-gradient(160deg, #C8102E 0%, #8B0A1F 100%);
  border:1px solid rgba(255,255,255,0.1);
}
/* collar -->
.p-body::before{
  content:'';position:absolute;
  top:0;left:50%;transform:translateX(-50%);
  width:0;height:0;
  border-left:14px solid transparent;
  border-right:14px solid transparent;
  border-top:20px solid #0A0000;
}

/* Arms -->
.p-arm-l{
  position:absolute;
  top:90px;left:12px;
  width:22px;height:110px;border-radius:11px;
  background:linear-gradient(160deg,#C8102E,#8B0A1F);
  transform:rotate(8deg);transform-origin:top center;
  animation:armSwayL 4s ease-in-out infinite;
}
.p-arm-r{
  position:absolute;
  top:90px;right:12px;
  width:22px;height:110px;border-radius:11px;
  background:linear-gradient(160deg,#C8102E,#8B0A1F);
  transform:rotate(-8deg);transform-origin:top center;
  animation:armSwayR 4s ease-in-out infinite;
}
@keyframes armSwayL{0%,100%{transform:rotate(8deg)}50%{transform:rotate(4deg)}}
@keyframes armSwayR{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(-4deg)}}

/* Hands -->
.p-hand-l,.p-hand-r{
  position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);
  width:18px;height:18px;border-radius:50%;
  background:#8B6348;
}

/* Legs -->
.p-leg-l{
  position:absolute;
  bottom:0;left:30px;
  width:34px;height:90px;border-radius:8px 8px 12px 12px;
  background:#1A1A1A;
}
.p-leg-r{
  position:absolute;
  bottom:0;right:30px;
  width:34px;height:90px;border-radius:8px 8px 12px 12px;
  background:#1A1A1A;
}

/* Glow / AR effect around person */
.person-glow{
  position:absolute;inset:-20px;
  border-radius:50%;
  background:radial-gradient(ellipse at 50% 70%, rgba(200,16,46,0.15) 0%, transparent 70%);
  animation:glowPulse 2s ease-in-out infinite alternate;
}
@keyframes glowPulse{from{opacity:.6}to{opacity:1}}

/* AR scan lines over person */
.person-scanlines{
  position:absolute;inset:0;
  background:repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(200,16,46,0.04) 3px, rgba(200,16,46,0.04) 4px);
  pointer-events:none;border-radius:inherit;
}

/* ── SPEECH BUBBLE / SUBTITLE ── */
.subtitle-wrap{
  position:fixed;
  bottom:0;left:0;right:0;
  z-index:8;
  padding:0 16px 32px;
}

.subtitle-box{
  background:rgba(0,0,0,0.82);
  border:1px solid rgba(200,16,46,0.4);
  border-radius:16px;
  padding:16px 20px;
  backdrop-filter:blur(8px);
  min-height:72px;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity 0.5s ease;
}
.subtitle-box.visible{opacity:1;}

.subtitle-text{
  font-size:17px;line-height:1.5;
  text-align:center;color:white;
  font-weight:400;
  letter-spacing:.01em;
}
.subtitle-text em{
  font-style:normal;
  color:#F5D97A;
  font-weight:600;
}

/* ── TOP HUD ── */
.hud{
  position:fixed;
  top:0;left:0;right:0;
  z-index:9;
  padding:14px 20px;
  display:flex;justify-content:space-between;align-items:center;
  background:linear-gradient(180deg,rgba(0,0,0,0.7) 0%,transparent 100%);
}
.hud-left{font-size:11px;font-weight:600;color:rgba(255,255,255,0.6);letter-spacing:.1em;text-transform:uppercase;}
.hud-right{
  display:flex;align-items:center;gap:6px;
  font-size:11px;color:#C8102E;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
}
.hud-dot{width:7px;height:7px;border-radius:50%;background:#C8102E;animation:blink 1.2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ── FINAL CARD ── */
.final-card{
  position:fixed;inset:0;z-index:20;
  background:rgba(10,0,0,0.95);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:20px;padding:32px 28px;
  opacity:0;pointer-events:none;
  transition:opacity 1s ease;
  text-align:center;
}
.final-card.visible{opacity:1;pointer-events:all;}

.final-drop{width:64px;height:80px;animation:dropPulse 1.5s ease-in-out infinite alternate;}
.final-title{font-size:36px;font-weight:900;color:#C8102E;line-height:1.1;}
.final-sub{font-size:16px;color:rgba(255,255,255,0.7);line-height:1.6;max-width:280px;}
.final-stat{
  font-size:52px;font-weight:900;color:white;line-height:1;
}
.final-stat span{font-size:18px;color:rgba(255,255,255,0.5);font-weight:400;display:block;margin-top:4px;}

.cta-btn{
  margin-top:8px;
  padding:16px 40px;
  background:#C8102E;color:white;
  font-size:16px;font-weight:700;
  border:none;border-radius:99px;cursor:pointer;
  letter-spacing:.05em;
  animation:ctaPulse 2s ease-in-out infinite;
}
@keyframes ctaPulse{0%,100%{box-shadow:0 0 0 0 rgba(200,16,46,0.5)}50%{box-shadow:0 0 0 14px rgba(200,16,46,0)}}

.replay-btn{
  font-size:13px;color:rgba(255,255,255,0.4);
  background:transparent;border:none;cursor:pointer;
  text-decoration:underline;
}
</style>
</head>
<body>

<!-- Camera background -->
<div class="camera-bg"></div>
<div class="scan-line"></div>

<!-- AR brackets -->
<div class="brackets">
  <div class="bracket tl"></div>
  <div class="bracket tr"></div>
  <div class="bracket bl"></div>
  <div class="bracket br"></div>
</div>

<!-- HUD -->
<div class="hud">
  <div class="hud-left">AR Experience</div>
  <div class="hud-right"><div class="hud-dot"></div> Live</div>
</div>

<!-- Loading screen -->
<div class="screen" id="loadScreen">
  <svg class="loading-drop" viewBox="0 0 60 75" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M30 5 Q8 32 8 50 Q8 66 30 70 Q52 66 52 50 Q52 32 30 5Z" fill="#C8102E"/>
    <path d="M30 20 Q16 38 16 50 Q16 58 24 63" stroke="rgba(255,255,255,0.25)" stroke-width="3" stroke-linecap="round" fill="none"/>
  </svg>
  <div class="loading-title">One Drop Saves Lives</div>
  <div class="loading-sub">Scanning for AR experience…</div>
  <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
</div>

<!-- AR person figure -->
<div class="ar-person" id="arPerson">
  <div class="person-figure">
    <div class="person-glow"></div>
    <div class="p-head"></div>
    <div class="p-neck"></div>
    <div class="p-body"></div>
    <div class="p-arm-l"><div class="p-hand-l"></div></div>
    <div class="p-arm-r"><div class="p-hand-r"></div></div>
    <div class="p-leg-l"></div>
    <div class="p-leg-r"></div>
    <div class="person-scanlines"></div>
  </div>
</div>

<!-- Subtitle box -->
<div class="subtitle-wrap">
  <div class="subtitle-box" id="subtitleBox">
    <div class="subtitle-text" id="subtitleText"></div>
  </div>
</div>

<!-- Final card -->
<div class="final-card" id="finalCard">
  <svg class="final-drop" viewBox="0 0 60 75" fill="none">
    <path d="M30 5 Q8 32 8 50 Q8 66 30 70 Q52 66 52 50 Q52 32 30 5Z" fill="#C8102E"/>
    <path d="M30 20 Q16 38 16 50 Q16 58 24 63" stroke="rgba(255,255,255,0.25)" stroke-width="3" stroke-linecap="round" fill="none"/>
  </svg>
  <div class="final-title">One Donor.<br>Saves Three Lives.</div>
  <div class="final-sub">You could be the reason someone gets their life back.</div>
  <div class="final-stat">3 <span>lives saved per donation</span></div>
  <button class="cta-btn" onclick="openNHS()">Register to donate →</button>
  <button class="replay-btn" onclick="replay()">Watch again</button>
</div>

<script>
// ── SUBTITLES timed to 25 seconds ──────────────────────────────
const lines = [
  { t: 0,    text: "I always know the exact moment the <em>relief starts kicking in</em>." },
  { t: 3.5,  text: "My body feels lighter… and the pain <em>slowly fades away</em>." },
  { t: 7,    text: "Suddenly, I'm not thinking about hospitals anymore." },
  { t: 10,   text: "I'm thinking about school, hanging out with friends… <em>just living</em>." },
  { t: 14,   text: "When you have sickle cell, donors don't just give you blood —" },
  { t: 17.5, text: "<em>you give us our lives back.</em>" },
  { t: 20,   text: "Your one donation can change my week, my month… <em>my lifetime.</em>" },
];
const TOTAL = 25000;

let startTime = null;
let subtitleTimer = null;
let lineIndex = 0;

const loadScreen  = document.getElementById('loadScreen');
const arPerson    = document.getElementById('arPerson');
const subtitleBox = document.getElementById('subtitleBox');
const subtitleTxt = document.getElementById('subtitleText');
const finalCard   = document.getElementById('finalCard');

// Start after loading bar (2.5s)
setTimeout(startExperience, 2600);

function startExperience(){
  loadScreen.classList.add('hidden');
  setTimeout(()=>{
    arPerson.classList.add('visible');
    subtitleBox.classList.add('visible');
    startTime = Date.now();
    lineIndex = 0;
    scheduleNext();
  }, 400);
  // End experience after 25s
  setTimeout(showFinal, TOTAL + 800);
}

function scheduleNext(){
  if(lineIndex >= lines.length) return;
  const line = lines[lineIndex];
  const delay = line.t * 1000 - (Date.now() - startTime);
  subtitleTimer = setTimeout(()=>{
    subtitleTxt.innerHTML = line.text;
    lineIndex++;
    scheduleNext();
  }, Math.max(delay, 0));
}

function showFinal(){
  subtitleBox.classList.remove('visible');
  arPerson.classList.remove('visible');
  setTimeout(()=>{ finalCard.classList.add('visible'); }, 600);
}

function openNHS(){
  window.open('https://www.blood.co.uk/the-donation-process/simple-steps-to-giving-blood/', '_blank');
}

function replay(){
  finalCard.classList.remove('visible');
  lineIndex = 0;
  clearTimeout(subtitleTimer);
  subtitleTxt.innerHTML = '';
  setTimeout(()=>{
    arPerson.classList.add('visible');
    subtitleBox.classList.add('visible');
    startTime = Date.now();
    scheduleNext();
    setTimeout(showFinal, TOTAL + 800);
  }, 600);
}
</script>
</body>
</html>
