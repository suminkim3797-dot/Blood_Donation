<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Blood Panel — Admin</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #F7F4F0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    gap: 20px;
  }

  .card {
    background: white;
    border-radius: 16px;
    border: 1px solid #E8E4DC;
    padding: 28px 32px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  }

  .card-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 8px;
  }

  .big-num {
    font-size: 72px;
    font-weight: 800;
    color: #C8102E;
    line-height: 1;
    text-align: center;
    margin: 8px 0;
    transition: all 0.3s;
  }

  .pct-row {
    text-align: center;
    font-size: 14px;
    color: #888;
    margin-bottom: 16px;
  }

  .prog-track {
    height: 8px;
    background: #F0ECE4;
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 6px;
  }
  .prog-fill {
    height: 100%;
    background: #C8102E;
    border-radius: 99px;
    transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
  }
  .prog-labels {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #AAA;
  }

  .btn-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 20px;
  }
  .btn-grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-top: 10px;
  }

  .btn {
    padding: 14px;
    border-radius: 12px;
    border: 1.5px solid #C8102E;
    background: #C8102E;
    color: white;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:hover { opacity: 0.85; }
  .btn:active { transform: scale(0.97); }
  .btn.outline {
    background: transparent;
    color: #C8102E;
  }
  .btn.gray {
    background: #F0ECE4;
    border-color: #D8D4CC;
    color: #666;
    font-size: 13px;
    font-weight: 500;
  }

  .btn-reset {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #E8E4DC;
    background: white;
    color: #C8102E;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
  }
  .btn-reset:hover { background: #FFF5F5; }

  .manual-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .manual-input {
    flex: 1;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1.5px solid #E8E4DC;
    font-size: 15px;
    outline: none;
    background: #FAFAF8;
  }
  .manual-input:focus { border-color: #C8102E; }
  .btn-set {
    padding: 12px 18px;
    border-radius: 10px;
    border: 1.5px solid #C8102E;
    background: #C8102E;
    color: white;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #222;
    color: white;
    font-size: 13px;
    padding: 10px 22px;
    border-radius: 99px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  .live-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: #888;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid #F0ECE4;
  }
  .live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #22AA66;
    display: inline-block;
    margin-right: 5px;
    animation: blink 1.4s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  .stat-mini {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }
  .stat-mini-item {
    flex: 1;
    background: #F7F4F0;
    border-radius: 10px;
    padding: 10px 12px;
    text-align: center;
  }
  .smi-val { font-size: 18px; font-weight: 700; color: #333; }
  .smi-lbl { font-size: 10px; color: #999; margin-top: 2px; }
</style>
</head>
<body>

<div class="card">
  <div class="card-title">Admin Panel — Blood Pack Tracker</div>
  <div class="big-num" id="bigNum">0</div>
  <div class="pct-row" id="pctRow">0% of goal (500 scans)</div>
  <div class="prog-track">
    <div class="prog-fill" id="pBar" style="width:0%"></div>
  </div>
  <div class="prog-labels">
    <span>0</span><span id="goalLbl">500</span>
  </div>

  <div class="stat-mini">
    <div class="stat-mini-item">
      <div class="smi-val" id="donorEst">0</div>
      <div class="smi-lbl">potential donors</div>
    </div>
    <div class="stat-mini-item">
      <div class="smi-val" id="livesEst">0</div>
      <div class="smi-lbl">lives that could be saved</div>
    </div>
  </div>

  <div class="btn-grid" style="margin-top:24px">
    <button class="btn" onclick="add(1)">+ 1 scan</button>
    <button class="btn outline" onclick="add(5)">+ 5 scans</button>
  </div>
  <div class="btn-grid-3">
    <button class="btn gray" onclick="add(10)">+10</button>
    <button class="btn gray" onclick="add(25)">+25</button>
    <button class="btn gray" onclick="add(50)">+50</button>
  </div>

  <div class="manual-row">
    <input class="manual-input" type="number" id="manualInput" placeholder="Set exact number..." min="0" max="9999"/>
    <button class="btn-set" onclick="setManual()">Set</button>
  </div>

  <button class="btn-reset" onclick="resetAll()">Reset to 0</button>

  <div class="live-row">
    <div><span class="live-dot"></span>Connected to live display</div>
    <div id="lastUpdate" style="color:#BBB">—</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════
// STEP 1: Replace with YOUR Firebase project URL
// ══════════════════════════════════════════════
const FIREBASE_CONFIG = {
  databaseURL: "https://bloodpanel-dd4ae-default-rtdb.firebaseio.com/"
};
const GOAL = 500;

firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();
const ref = db.ref("bloodpack/scans");

let current = 0;

function render(n){
  current = n;
  const p = Math.min(n / GOAL, 1);
  document.getElementById('bigNum').textContent = n.toLocaleString();
  document.getElementById('pctRow').textContent = Math.round(p*100) + '% of goal (' + GOAL + ' scans)';
  document.getElementById('pBar').style.width = Math.min(p*100, 100) + '%';
  document.getElementById('donorEst').textContent = Math.round(n * 0.22);
  document.getElementById('livesEst').textContent = Math.round(n * 0.22 * 3);
  const now = new Date();
  document.getElementById('lastUpdate').textContent = 'Updated ' + now.toLocaleTimeString();
}

function add(n){
  const next = Math.min(current + n, 9999);
  ref.set(next);
  toast('+' + n + ' scan' + (n > 1 ? 's' : '') + ' added');
}

function setManual(){
  const v = parseInt(document.getElementById('manualInput').value);
  if(isNaN(v) || v < 0){ toast('Enter a valid number'); return; }
  ref.set(v);
  document.getElementById('manualInput').value = '';
  toast('Set to ' + v);
}

function resetAll(){
  if(!confirm('Reset scan count to 0?')) return;
  ref.set(0);
  toast('Reset to 0');
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

ref.on('value', snap => render(snap.val() || 0));
</script>
</body>
</html>
