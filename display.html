<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>One Drop Saves Lives — Live Display</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:#F5CFC4;
  font-family:'Segoe UI',Arial,sans-serif;
}

.slide{
  position:fixed;
  width:1920px;height:1080px;
  transform-origin:top left;
  display:grid;
  grid-template-columns:1fr 1fr;
}

/* ── LEFT: blood pack ── */
.left{
  display:flex;align-items:center;justify-content:center;
  position:relative;
}

.pack-wrap{
  position:relative;
  width:560px;height:700px;
}

.bag-svg{width:500px;height:640px;filter:drop-shadow(0 20px 40px rgba(0,0,0,0.15));}
.blood-fill{transition:height 1.2s cubic-bezier(.4,0,.2,1),y 1.2s cubic-bezier(.4,0,.2,1);}
.blood-surface{transition:all 1.2s cubic-bezier(.4,0,.2,1);}

.fill-badge{
  position:absolute;
  bottom:18px;left:50%;
  transform:translateX(-50%);
  font-size:30px;font-weight:800;color:white;
  background:#C8102E;
  border-radius:99px;
  padding:10px 32px;
  opacity:0;
  transition:opacity 0.8s;
  white-space:nowrap;
}
.fill-badge.visible{opacity:1;}

/* ── RIGHT: info ── */
.right{
  display:flex;flex-direction:column;
  justify-content:center;
  padding:56px 80px 56px 32px;
  gap:32px;
}

.live-row{
  display:flex;align-items:center;gap:10px;
  font-size:13px;font-weight:700;
  color:#C8102E;letter-spacing:.12em;text-transform:uppercase;
}
.live-dot{
  width:10px;height:10px;border-radius:50%;
  background:#C8102E;
  animation:blink 1.4s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}

.headline{
  font-size:52px;font-weight:900;
  color:#1A1A1A;line-height:1.1;
}
.headline em{font-style:normal;color:#C8102E;}

/* QR + facts row */
.qr-facts{
  display:flex;align-items:flex-start;gap:40px;
}

.qr-box{
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 8px 32px rgba(0,0,0,0.10);
  flex-shrink:0;
}
.qr-box img{
  width:220px;height:220px;
  display:block;border-radius:6px;
}

.facts-wrap{display:flex;flex-direction:column;gap:18px;justify-content:center;}
.facts-title{font-size:20px;font-weight:700;color:#1A1A1A;margin-bottom:4px;}

.fact{display:flex;align-items:center;gap:16px;}
.fact-icon{
  width:44px;height:44px;border-radius:50%;
  background:#C8102E;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.fact-text{font-size:17px;color:#333;line-height:1.4;}
.fact-text strong{color:#1A1A1A;}

/* counter + progress */
.bottom-row{display:flex;align-items:center;gap:36px;}

.counter-box{
  background:white;border-radius:16px;
  padding:18px 28px;
  box-shadow:0 4px 16px rgba(0,0,0,0.08);
  display:flex;align-items:center;gap:20px;
  flex-shrink:0;
}
.counter-num{
  font-size:68px;font-weight:900;color:#C8102E;line-height:1;
  min-width:90px;text-align:center;
  transition:all 0.5s;
}
.counter-label{font-size:14px;font-weight:700;color:#333;text-transform:uppercase;letter-spacing:.05em;}
.counter-sub{font-size:12px;color:#888;margin-top:2px;}

.prog-wrap{flex:1;display:flex;flex-direction:column;gap:8px;}
.prog-top{display:flex;justify-content:space-between;font-size:14px;color:#666;font-weight:500;}
.prog-track{height:12px;background:rgba(0,0,0,0.10);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:#C8102E;border-radius:99px;transition:width 1.2s cubic-bezier(.4,0,.2,1);}

@keyframes pop{0%{transform:scale(.8);opacity:.5}60%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
.pop{animation:pop .45s cubic-bezier(.4,0,.2,1);}
</style>
</head>
<body>

<div class="slide" id="slide">

  <!-- LEFT -->
  <div class="left">
    <div class="pack-wrap">
      <svg class="bag-svg" viewBox="0 0 500 640" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="bc">
            <path d="M60 148 Q60 128 80 120 L250 110 L420 120 Q440 128 440 148 L440 560 Q440 590 415 598 L250 608 L85 598 Q60 590 60 560 Z"/>
          </clipPath>
        </defs>

        <!-- hook -->
        <rect x="210" y="8" width="80" height="28" rx="10" fill="#C0BCB4"/>
        <path d="M228 36 L228 18 Q228 6 250 6 Q272 6 272 18 L272 36" fill="none" stroke="#AEAAA0" stroke-width="10" stroke-linecap="round"/>
        <!-- hanger -->
        <rect x="188" y="54" width="124" height="42" rx="14" fill="#BEBAB2" stroke="#AEAAA2" stroke-width="2"/>
        <circle cx="218" cy="75" r="11" fill="#A8A49C"/>
        <circle cx="282" cy="75" r="11" fill="#A8A49C"/>

        <!-- outer rim -->

        <!-- bag body — cream/empty -->
        <path d="M60 148 Q60 128 80 120 L250 110 L420 120 Q440 128 440 148 L440 560 Q440 590 415 598 L250 608 L85 598 Q60 590 60 560 Z" fill="#EEE8DC"/>

        <!-- blood fill animated -->
        <g clip-path="url(#bc)">
          <rect id="bf" x="58" y="608" width="386" height="0" fill="#C8102E" class="blood-fill"/>
          <path id="bs" d="" fill="#DC1020" class="blood-surface"/>
        </g>

        <!-- plastic sheen -->
        <path d="M60 148 Q60 128 80 120 L250 110 L420 120 Q440 128 440 148 L440 560 Q440 590 415 598 L250 608 L85 598 Q60 590 60 560 Z" fill="none" stroke="#C4C0B8" stroke-width="3"/>
        <path d="M86 180 Q72 320 74 460 Q75 530 82 575" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="22" stroke-linecap="round"/>
        <ellipse cx="240" cy="205" rx="110" ry="28" fill="rgba(255,255,255,0.16)"/>

        <!-- label -->
        <rect x="98" y="170" width="304" height="274" rx="10" fill="rgba(255,255,255,0.78)" stroke="#D0CCc4" stroke-width="1.5"/>
        <!-- teal barcode sticker -->
        <rect x="148" y="180" width="230" height="110" rx="8" fill="#A8D4D8" stroke="#88B8BC" stroke-width="1"/>
        <g fill="#222" transform="translate(154,190)">
          <rect x="0" y="0" width="2" height="54"/><rect x="5" y="0" width="4" height="54"/>
          <rect x="12" y="0" width="2" height="54"/><rect x="17" y="0" width="3" height="54"/>
          <rect x="23" y="0" width="2" height="54"/><rect x="28" y="0" width="5" height="54"/>
          <rect x="36" y="0" width="2" height="54"/><rect x="41" y="0" width="3" height="54"/>
          <rect x="47" y="0" width="2" height="54"/><rect x="52" y="0" width="4" height="54"/>
          <rect x="59" y="0" width="2" height="54"/><rect x="64" y="0" width="3" height="54"/>
          <rect x="70" y="0" width="2" height="54"/><rect x="75" y="0" width="5" height="54"/>
          <rect x="83" y="0" width="2" height="54"/><rect x="88" y="0" width="3" height="54"/>
          <rect x="94" y="0" width="2" height="54"/><rect x="99" y="0" width="4" height="54"/>
          <rect x="106" y="0" width="2" height="54"/><rect x="111" y="0" width="3" height="54"/>
          <rect x="117" y="0" width="2" height="54"/><rect x="122" y="0" width="5" height="54"/>
          <rect x="130" y="0" width="2" height="54"/>
        </g>
        <rect x="152" y="252" width="72" height="28" rx="7" fill="rgba(255,255,255,0.9)"/>
        <circle cx="354" cy="226" r="26" fill="rgba(255,255,255,0.9)"/>
        <circle cx="354" cy="226" r="26" fill="none" stroke="#C8102E" stroke-width="4"/>
        <circle cx="354" cy="226" r="14" fill="none" stroke="#C8102E" stroke-width="4"/>

        <!-- label text lines -->
        <rect x="108" y="304" width="68" height="7" rx="3.5" fill="#AAAAAA" opacity="0.4"/>
        <rect x="108" y="320" width="56" height="6" rx="3" fill="#AAAAAA" opacity="0.35"/>
        <rect x="108" y="334" width="62" height="6" rx="3" fill="#AAAAAA" opacity="0.35"/>
        <!-- blood drop -->
        <path d="M124 364 Q116 350 116 344 Q116 334 124 334 Q132 334 132 344 Q132 350 124 364Z" fill="#C8102E"/>
        <!-- handwriting lines -->
        <rect x="150" y="306" width="240" height="9" rx="4.5" fill="#888" opacity="0.18"/>
        <rect x="150" y="324" width="200" height="9" rx="4.5" fill="#888" opacity="0.18"/>
        <rect x="150" y="342" width="220" height="9" rx="4.5" fill="#888" opacity="0.18"/>
        <!-- heart 143 -->
        <path d="M288 376 Q284 369 284 365 Q284 357 292 357 Q296 357 298 361 Q300 357 304 357 Q312 357 312 365 Q312 371 298 382Z" fill="#C8102E"/>
        <text x="320" y="380" font-size="22" font-weight="bold" font-family="Arial,sans-serif" fill="#C8102E">143</text>
        <!-- red warning bar -->
        <rect x="106" y="392" width="288" height="28" rx="4" fill="#C8102E" opacity="0.72"/>
        <rect x="120" y="400" width="120" height="12" rx="6" fill="white" opacity="0.5"/>
        <rect x="256" y="400" width="96" height="12" rx="6" fill="white" opacity="0.5"/>

        <!-- top ports -->
        <rect x="190" y="94" width="26" height="40" rx="8" fill="#D0CCC4" stroke="#BEB8B0" stroke-width="1.5"/>
        <rect x="194" y="94" width="18" height="16" rx="5" fill="#C8102E"/>
        <rect x="284" y="94" width="26" height="40" rx="8" fill="#D0CCC4" stroke="#BEB8B0" stroke-width="1.5"/>
        <rect x="288" y="94" width="18" height="16" rx="5" fill="#C8102E"/>

        <!-- bottom ports -->
        <ellipse cx="166" cy="614" rx="26" ry="20" fill="#C4C0B8" stroke="#B4B0A8" stroke-width="2"/>
        <rect x="153" y="606" width="26" height="66" rx="9" fill="#C8C4BC" stroke="#B8B4AC" stroke-width="1.5"/>
        <rect x="159" y="612" width="14" height="54" rx="5" fill="#D8D4CC"/>
        <ellipse cx="334" cy="614" rx="26" ry="20" fill="#C4C0B8" stroke="#B4B0A8" stroke-width="2"/>
        <rect x="321" y="606" width="26" height="66" rx="9" fill="#C8C4BC" stroke="#B8B4AC" stroke-width="1.5"/>
        <rect x="327" y="612" width="14" height="54" rx="5" fill="#D8D4CC"/>

        <!-- tubes -->
        <path d="M166 672 Q162 624 160 584" fill="none" stroke="#C8C4BC" stroke-width="14" stroke-linecap="round"/>
        <path d="M334 672 Q338 624 340 584" fill="none" stroke="#C8C4BC" stroke-width="14" stroke-linecap="round"/>
        <path d="M166 672 Q250 694 334 672" fill="none" stroke="#C0BCB4" stroke-width="14" stroke-linecap="round"/>
        <rect x="228" y="668" width="44" height="30" rx="11" fill="#C8C4BC" stroke="#B4B0A8" stroke-width="2"/>
      </svg>

      <div class="fill-badge" id="fillBadge"></div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">

    <div class="live-row">
      <div class="live-dot"></div>
      Live — QEOP Sadler's Wells East Square
    </div>

    <div class="headline">
      SCAN THE QR CODE<br>TO <em>FILL THE BLOOD PACK</em>
    </div>

    <div class="qr-facts">
      <!-- QR code — auto-generated, no file needed -->
      <div class="qr-box">
        <img
          src="https://api.qrserver.com/v1/create-qr-code/?size=440x440&color=8B0A1F&bgcolor=FFFFFF&data=https://suminkim3797-dot.github.io/Blood_Donation/tracker.html"
          alt="QR code"
          width="220" height="220"
        >
      </div>

      <div class="facts-wrap">
        <div class="facts-title">Do you know?</div>

        <div class="fact">
          <div class="fact-icon">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
              <path d="M11 2 L13.2 7.8 L20 8.5 L15 13 L16.4 19.8 L11 16.5 L5.6 19.8 L7 13 L2 8.5 L8.8 7.8 Z" fill="white"/>
            </svg>
          </div>
          <div class="fact-text">1 donation can save <strong>3 lives</strong></div>
        </div>

        <div class="fact">
          <div class="fact-icon">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
              <path d="M11 19 Q4 13 4 8 Q4 4.5 7.5 4 Q9.5 4 11 6.5 Q12.5 4 14.5 4 Q18 4.5 18 8 Q18 13 11 19Z" fill="white"/>
            </svg>
          </div>
          <div class="fact-text">Donors can <strong>reduce heart disease risk</strong></div>
        </div>

        <div class="fact">
          <div class="fact-icon">
            <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
              <circle cx="11" cy="11" r="8" stroke="white" stroke-width="2" fill="none"/>
              <path d="M8 11 L10 13 L14 9" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="fact-text">Black donors hold the <strong>Ro blood type</strong> sickle cell patients need</div>
        </div>
      </div>
    </div>

    <div class="bottom-row">
      <div class="counter-box">
        <div class="counter-num" id="scanNum">0</div>
        <div>
          <div class="counter-label">QR scans today</div>
          <div class="counter-sub">Goal: <span id="goalSpan">50</span> scans</div>
        </div>
      </div>

      <div class="prog-wrap">
        <div class="prog-top">
          <span>Campaign progress</span>
          <span id="progLbl">0 / 50</span>
        </div>
        <div class="prog-track">
          <div class="prog-fill" id="progFill" style="width:0%"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
const FIREBASE_CONFIG = {
  databaseURL: "https://bloodpanel-dd4ae-default-rtdb.firebaseio.com"
};
const GOAL = 50;

firebase.initializeApp(FIREBASE_CONFIG);
firebase.database().ref("bloodpack/scans").on('value', snap => render(snap.val() || 0));

function scale(){
  const s = document.getElementById('slide');
  const sx = window.innerWidth / 1920;
  const sy = window.innerHeight / 1080;
  const sc = Math.min(sx, sy);
  s.style.transform = `scale(${sc})`;
  s.style.left = ((window.innerWidth - 1920*sc)/2) + 'px';
  s.style.top  = ((window.innerHeight - 1080*sc)/2) + 'px';
}
scale();
window.addEventListener('resize', scale);

function render(scans){
  const p = Math.min(scans / GOAL, 1);
  const BAG_H = 460, BAG_BOTTOM = 608;
  const fillH = Math.round(p * BAG_H);
  const fillY = BAG_BOTTOM - fillH;

  document.getElementById('bf').setAttribute('y', fillH > 0 ? fillY : BAG_BOTTOM);
  document.getElementById('bf').setAttribute('height', fillH);

  document.getElementById('bs').setAttribute('d',
    fillH > 6
      ? `M58 ${fillY} Q145 ${fillY-14} 250 ${fillY} Q355 ${fillY+14} 442 ${fillY} L442 ${BAG_BOTTOM} L58 ${BAG_BOTTOM} Z`
      : ''
  );

  const pct = Math.round(p * 100);
  const badge = document.getElementById('fillBadge');
  badge.textContent = pct + '%';
  badge.classList.toggle('visible', pct > 0);

  const sn = document.getElementById('scanNum');
  sn.textContent = scans.toLocaleString();
  sn.classList.remove('pop'); void sn.offsetWidth; sn.classList.add('pop');

  document.getElementById('progFill').style.width = Math.min(p * 100, 100) + '%';
  document.getElementById('progLbl').textContent = scans + ' / ' + GOAL;
}
</script>
</body>
</html>
