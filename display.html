<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>One Drop Saves Lives — Live Display</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:#F5CFC4;
  font-family:'Segoe UI',Arial,sans-serif;
}

.slide{
  position:fixed;
  width:1920px;height:1080px;
  transform-origin:top left;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:80px;
  padding:0 80px;
}

/* ── LEFT ── */
.left{
  flex-shrink:0;
  position:relative;
  width:620px;
  height:900px;
}

.bag-svg{
  position:absolute;
  top:0;left:0;
  width:620px;height:900px;
  filter:drop-shadow(0 24px 48px rgba(0,0,0,0.16));
}

/* Handwriting sits inside label area
   SVG viewBox=500x640, rendered at 620x900
   scale = 620/500 = 1.24 horizontally, 900/640 = 1.406 vertically
   Label rect in SVG: x=98 y=270 w=304 h=180 (below barcode)
   In px: x=98*1.24=122, y=270*1.406=380, w=304*1.24=377, h=180*1.406=253
*/
.hw-wrap{
  position:absolute;
  top:348px;      /* label top in rendered px */
  left:122px;     /* label left in rendered px */
  width:377px;    /* label width in rendered px */
  height:200px;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
  text-align:center;
}

.hw-text{
  font-family:'Caveat',cursive;
  font-size:34px;
  font-weight:600;
  color:#2A2A2A;
  line-height:1.45;
  opacity:0;
  transform:translateY(6px);
  transition:opacity 0.5s ease, transform 0.5s ease;
}
.hw-text.visible{
  opacity:1;
  transform:translateY(0);
}

.fill-badge{
  position:absolute;
  bottom:20px;left:50%;
  transform:translateX(-50%);
  font-size:34px;font-weight:800;color:white;
  background:#C8102E;
  border-radius:99px;
  padding:12px 40px;
  opacity:0;
  transition:opacity 0.8s;
  white-space:nowrap;
}
.fill-badge.visible{opacity:1;}

/* ── RIGHT ── */
.right{
  flex:1;
  display:flex;flex-direction:column;
  justify-content:center;
  gap:40px;
  max-width:920px;
}

.live-row{
  display:flex;align-items:center;gap:10px;
  font-size:13px;font-weight:700;
  color:#C8102E;letter-spacing:.12em;text-transform:uppercase;
}
.live-dot{
  width:10px;height:10px;border-radius:50%;
  background:#C8102E;
  animation:blink 1.4s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}

.headline{
  font-size:56px;font-weight:900;
  color:#1A1A1A;line-height:1.1;
}
.headline em{font-style:normal;color:#C8102E;}

.qr-facts{
  display:flex;align-items:flex-start;gap:48px;
}
.qr-box{
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 8px 32px rgba(0,0,0,0.10);
  flex-shrink:0;
}
.qr-box img{
  width:250px;height:250px;
  display:block;border-radius:6px;
}
.facts-wrap{
  display:flex;flex-direction:column;
  gap:26px;justify-content:center;
}
.facts-title{
  font-size:24px;font-weight:700;
  color:#1A1A1A;margin-bottom:2px;
}
.fact{display:flex;align-items:center;gap:18px;}
.fact-icon{
  width:50px;height:50px;border-radius:50%;
  background:#C8102E;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.fact-text{font-size:19px;color:#333;line-height:1.4;}
.fact-text strong{color:#1A1A1A;}
</style>
</head>
<body>
<div class="slide" id="slide">

  <!-- LEFT -->
  <div class="left">
    <svg class="bag-svg" viewBox="0 0 500 640" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <clipPath id="bc">

        </clipPath>
      </defs>
      <!-- hook -->

      <!-- blood fill -->

        <rect id="bf" x="58" y="608" width="386" height="0" fill="#C8102E" class="blood-fill" style="transition:height 1.2s cubic-bezier(.4,0,.2,1),y 1.2s cubic-bezier(.4,0,.2,1)"/>
        <path id="bs" d="" fill="#DC1020" style="transition:all 1.2s cubic-bezier(.4,0,.2,1)"/>
      </g>
      <!-- sheen -->

      <path d="M86 180 Q72 320 74 460 Q75 530 82 575" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="22" stroke-linecap="round"/>
      <ellipse cx="240" cy="205" rx="110" ry="28" fill="rgba(255,255,255,0.16)"/>

      <!-- WHITE LABEL — x=98 y=170 w=304 h=274 -->
      <rect x="98" y="170" width="304" height="274" rx="10" fill="rgba(255,255,255,0.82)" stroke="#D0CCC4" stroke-width="1.5"/>

      <g fill="#222" transform="translate(154,186)">
        <rect x="0" y="0" width="2" height="44"/><rect x="5" y="0" width="4" height="44"/>
        <rect x="12" y="0" width="2" height="44"/><rect x="17" y="0" width="3" height="44"/>
        <rect x="23" y="0" width="2" height="44"/><rect x="28" y="0" width="5" height="44"/>
        <rect x="36" y="0" width="2" height="44"/><rect x="41" y="0" width="3" height="44"/>
        <rect x="47" y="0" width="2" height="44"/><rect x="52" y="0" width="4" height="44"/>
        <rect x="59" y="0" width="2" height="44"/><rect x="64" y="0" width="3" height="44"/>
        <rect x="70" y="0" width="2" height="44"/><rect x="75" y="0" width="5" height="44"/>
        <rect x="83" y="0" width="2" height="44"/><rect x="88" y="0" width="3" height="44"/>
        <rect x="94" y="0" width="2" height="44"/><rect x="99" y="0" width="4" height="44"/>
        <rect x="106" y="0" width="2" height="44"/><rect x="111" y="0" width="3" height="44"/>
        <rect x="117" y="0" width="2" height="44"/><rect x="122" y="0" width="5" height="44"/>
        <rect x="130" y="0" width="2" height="44"/>
      </g>
      <rect x="152" y="238" width="58" height="20" rx="6" fill="rgba(255,255,255,0.9)"/>
      <circle cx="350" cy="212" r="20" fill="rgba(255,255,255,0.9)"/>
      <circle cx="350" cy="212" r="20" fill="none" stroke="#C8102E" stroke-width="3.5"/>
      <circle cx="350" cy="212" r="11" fill="none" stroke="#C8102E" stroke-width="3.5"/>

      <!-- blood drop left on label -->
      <path d="M122 340 Q114 326 114 320 Q114 310 122 310 Q130 310 130 320 Q130 326 122 340Z" fill="#C8102E"/>

      <!-- heart + 143 near bottom of label -->
      <path d="M288 406 Q284 399 284 395 Q284 387 292 387 Q296 387 298 391 Q300 387 304 387 Q312 387 312 395 Q312 401 298 412Z" fill="#C8102E"/>
      <text x="318" y="410" font-size="20" font-weight="bold" font-family="Arial,sans-serif" fill="#C8102E">143</text>

      <!-- red warning bar at bottom of label -->
      <rect x="106" y="420" width="288" height="20" rx="4" fill="#C8102E" opacity="0.72"/>
      <rect x="118" y="426" width="110" height="8" rx="4" fill="white" opacity="0.5"/>
      <rect x="244" y="426" width="90" height="8" rx="4" fill="white" opacity="0.5"/>

      <!-- top ports -->
      <rect x="190" y="94" width="26" height="40" rx="8" fill="#D0CCC4" stroke="#BEB8B0" stroke-width="1.5"/>
      <rect x="194" y="94" width="18" height="16" rx="5" fill="#C8102E"/>
      <rect x="284" y="94" width="26" height="40" rx="8" fill="#D0CCC4" stroke="#BEB8B0" stroke-width="1.5"/>
      <rect x="288" y="94" width="18" height="16" rx="5" fill="#C8102E"/>
      <!-- bottom ports -->
      <ellipse cx="166" cy="614" rx="26" ry="20" fill="#C4C0B8" stroke="#B4B0A8" stroke-width="2"/>
      <rect x="153" y="606" width="26" height="66" rx="9" fill="#C8C4BC" stroke="#B8B4AC" stroke-width="1.5"/>
      <rect x="159" y="612" width="14" height="54" rx="5" fill="#D8D4CC"/>
      <ellipse cx="334" cy="614" rx="26" ry="20" fill="#C4C0B8" stroke="#B4B0A8" stroke-width="2"/>
      <rect x="321" y="606" width="26" height="66" rx="9" fill="#C8C4BC" stroke="#B8B4AC" stroke-width="1.5"/>
      <rect x="327" y="612" width="14" height="54" rx="5" fill="#D8D4CC"/>
      <!-- tubes -->
      <path d="M166 672 Q162 624 160 584" fill="none" stroke="#C8C4BC" stroke-width="14" stroke-linecap="round"/>
      <path d="M334 672 Q338 624 340 584" fill="none" stroke="#C8C4BC" stroke-width="14" stroke-linecap="round"/>
      <path d="M166 672 Q250 694 334 672" fill="none" stroke="#C0BCB4" stroke-width="14" stroke-linecap="round"/>
      <rect x="228" y="668" width="44" height="30" rx="11" fill="#C8C4BC" stroke="#B4B0A8" stroke-width="2"/>
    </svg>

    <!-- Handwriting overlay — precisely over white label area -->
    <!-- Label in SVG: x=98 y=270 w=304 (below barcode at y=178+88=266)
         Content zone (below barcode, above heart): y=270~400, centre y=335
         In 620x900 render (scale 1.24x, 1.406y):
         left = 98*1.24 = 122px
         width = 304*1.24 = 377px
         top = 270*1.406 = 380px
         height = 130*1.406 = 183px -->
    <div class="hw-wrap">
      <div class="hw-text" id="hwText"></div>

    <div class="fill-badge" id="fillBadge"></div>

  <!-- RIGHT -->
  <div class="right">
    <div class="live-row">
      <div class="live-dot"></div>
      Live — QEOP Sadler's Wells East Square
    </div>
    <div class="headline">
      SCAN THE QR CODE<br>TO <em>FILL THE BLOOD PACK</em>
    </div>
    <div class="qr-facts">
      <div class="qr-box">
        <img
          src="https://api.qrserver.com/v1/create-qr-code/?size=500x500&color=8B0A1F&bgcolor=FFFFFF&data=https://suminkim3797-dot.github.io/Blood_Donation/tracker.html"
          alt="QR code" width="250" height="250"
        >
      </div>
      <div class="facts-wrap">
        <div class="facts-title">Do you know?</div>
        <div class="fact">
          <div class="fact-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
              <path d="M12 2 L14.4 8.4 L21 9.2 L16 14 L17.6 20.8 L12 17.6 L6.4 20.8 L8 14 L3 9.2 L9.6 8.4 Z" fill="white"/>
            </svg>
          </div>
          <div class="fact-text">1 donation can save <strong>3 lives</strong></div>
        </div>
        <div class="fact">
          <div class="fact-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
              <path d="M12 20 Q4 14 4 8.5 Q4 5 7.5 4.5 Q9.5 4.5 12 7 Q14.5 4.5 16.5 4.5 Q20 5 20 8.5 Q20 14 12 20Z" fill="white"/>
            </svg>
          </div>
          <div class="fact-text">Donors can <strong>reduce heart disease risk</strong></div>
        </div>
        <div class="fact">
          <div class="fact-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="9" stroke="white" stroke-width="2" fill="none"/>

          <div class="fact-text">Black donors hold the <strong>Ro blood type</strong> sickle cell patients need</div>
        </div>
      </div>
    </div>

</div>

<script>
const FIREBASE_CONFIG = {
  databaseURL: "https://bloodpanel-dd4ae-default-rtdb.firebaseio.com"
};
const GOAL = 50;

const stories = [
  "I went back to university\nand finished my master's.",
  "I danced at my\ndaughter's wedding.",
  "I coached my son's\nfootball team again.",
  "I finally travelled\nto see my family.",
  "I got my first job\nout of hospital.",
  "I ran a 5K with\nmy best friends.",
  "I celebrated my\n30th birthday.",
];

let storyIdx = 0;
const hwText = document.getElementById('hwText');

function showStory(text){
  hwText.classList.remove('visible');
  setTimeout(() => {
    hwText.innerHTML = text.replace(/\n/g, '<br>');
    hwText.classList.add('visible');
  }, 450);
}

showStory(stories[0]);
setInterval(() => {
  storyIdx = (storyIdx + 1) % stories.length;
  showStory(stories[storyIdx]);
}, 5000);

firebase.initializeApp(FIREBASE_CONFIG);
firebase.database().ref("bloodpack/scans").on('value', snap => render(snap.val() || 0));

function scale(){
  const s  = document.getElementById('slide');
  const sx = window.innerWidth  / 1920;
  const sy = window.innerHeight / 1080;
  const sc = Math.min(sx, sy);
  s.style.transform = `scale(${sc})`;
  s.style.left = ((window.innerWidth  - 1920 * sc) / 2) + 'px';
  s.style.top  = ((window.innerHeight - 1080 * sc) / 2) + 'px';
}
scale();
window.addEventListener('resize', scale);

function render(scans){
  const p     = Math.min(scans / GOAL, 1);
  const BAG_H = 460, BAG_BOTTOM = 608;
  const fillH = Math.round(p * BAG_H);
  const fillY = BAG_BOTTOM - fillH;

  document.getElementById('bf').setAttribute('y',      fillH > 0 ? fillY : BAG_BOTTOM);
  document.getElementById('bf').setAttribute('height', fillH);
  document.getElementById('bs').setAttribute('d',
    fillH > 6
      ? `M58 ${fillY} Q145 ${fillY-14} 250 ${fillY} Q355 ${fillY+14} 442 ${fillY} L442 ${BAG_BOTTOM} L58 ${BAG_BOTTOM} Z`
      : ''
  );

  const pct   = Math.round(p * 100);
  const badge = document.getElementById('fillBadge');
  badge.textContent = pct + '%';
  badge.classList.toggle('visible', pct > 0);
}
</script>
</body>
</html>
